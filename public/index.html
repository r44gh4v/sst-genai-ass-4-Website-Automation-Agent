<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
    <title>Browser Automation Agent</title>
</head>

<body>
    <header>
        <div class="brand">
            <div class="logo">🪩</div>
            <div class="brand-text">
                <h1>Browser Automation Agent</h1>
                <p class="sub">Describe the task & a robot will make the browser do it for you ;)</p>
            </div>
        </div>

        <div class="meta">
            <span class="pill" id="statusPill">
                <!-- <span class="dot" id="dot"></span> -->
                <span id="statusText">Idle</span>
                <span id="iter" class="muted"></span>
            </span>
        </div>
    </header>

    <main>
        <!-- LEFT col: task input -->
        <section class="col col-left">
            <div class="card grow">
                <div class="card-head">
                    <h2>Task</h2>
                </div>
                <textarea id="prompt"
                    placeholder="e.g. Go to wikipedia.org and search for 'quantum computing', then summarise the first paragraph"></textarea>
                <div class="examples" id="examples"></div>
                <div class="row">
                    <button id="run" class="btn btn-primary">Run automation</button>
                    <button id="stop" class="btn btn-ghost" hidden>Stop</button>
                </div>
            </div>
        </section>

        <!-- CENTER col: live activity feed -->
        <section class="col col-center">
            <div class="card grow" id="panel-activity">
                <div class="card-head">
                    <h2>Live activity <span class="count" id="feedCount"></span></h2>
                    <button id="clearFeed" class="mini-btn">Clear</button>
                </div>
                <div class="card-body">
                    <div id="feed"><span class="empty">Agent steps shall stream here in real time</span></div>
                </div>
            </div>
        </section>

        <!-- RIGHT col: screenshots vertical stack -->
        <section class="col col-right">
            <div class="card grow" id="panel-shots">
                <div class="card-head">
                    <h2>Screenshots <span class="count" id="shotCount"></span></h2>
                </div>
                <div class="card-body">
                    <div id="shots"><span class="empty">Screenshots shall appear here</span></div>
                </div>
            </div>
        </section>
    </main>

    <!-- Mobile tab bar: switches center & right panels on small screens -->
    <nav class="tabbar" id="tabbar" aria-label="Panel switcher">
        <button class="tab active" data-tab="activity">Activity</button>
        <button class="tab" data-tab="shots">Screenshots</button>
    </nav>

    <div id="lightbox"><img id="lightboxImg" alt="screenshot" /></div>

    <script src="/app.js" defer></script>
</body>

</html>
